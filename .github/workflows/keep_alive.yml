name: Keep Render Alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping services in parallel
        shell: bash
        run: |
          urls=(
            "https://theaiavalon-portal-server.onrender.com/api/v1/health"
            "https://render-load-balancer.onrender.com"
            "https://accounts.theaiavalon.in"
            "https://student.portal.theaiavalon.in"
            "https://mentor.portal.theaiavalon.in"
            "https://admin.portal.theaiavalon.in"
          )

          pids=()
          for url in "${urls[@]}"; do
            (
              code=$(curl -sS -L --max-time 30 -o /dev/null -w "%{http_code}" "$url")
              curl_exit=$?

              if [ "$curl_exit" -ne 0 ]; then
                echo "$url -> CURL_ERROR($curl_exit)"
                exit 0
              fi

              if [ "$code" = "404" ]; then
                echo "$url -> 404 (Not Found, handled)"
                exit 0
              fi

              echo "$url -> $code"
              exit 0
            ) &
            pids+=($!)
          done

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done

          if [ "$failed" -gt 0 ]; then
            echo "$failed service subprocess(es) exited unexpectedly (continuing)"
            exit 0
          fi

          echo "All service checks completed"
