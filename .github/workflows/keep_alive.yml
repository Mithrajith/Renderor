name: Keep Render Alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping services in parallel
        shell: bash
        run: |
          urls=(
            "https://theaiavalon-portal-server.onrender.com/api/v1/health"
            "https://render-load-balancer.onrender.com"
            "https://accounts.theaiavalon.in"
            "https://student.portal.theaiavalon.in"
            "https://mentor.portal.theaiavalon.in"
            "https://admin.portal.theaiavalon.in"
          )

          pids=()
          for url in "${urls[@]}"; do
            echo "Pinging $url"
            curl -sf --max-time 30 -o /dev/null -w "%{url_effective} → %{http_code}\n" "$url" &
            pids+=($!)
          done

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done

          if [ "$failed" -gt 0 ]; then
            echo "⚠️ $failed service(s) failed to respond"
            exit 1
          fi

          echo "✅ All services responded successfully"
